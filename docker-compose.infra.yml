version: '3.9'

# STRATUM PROTOCOL — Infrastructure Services
# Run: docker compose -f docker-compose.infra.yml up -d

name: stratum-infra

networks:
  stratum-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  kafka-data:
  zookeeper-data:
  neo4j-data:
  postgres-data:
  timescale-data:
  redis-data:
  vault-data:
  minio-data:
  prometheus-data:
  grafana-data:
  elasticsearch-data:

services:
  # ---------------------------------------------------------------------------
  # ZOOKEEPER (Kafka dependency)
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: stratum-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - stratum-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # KAFKA
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: stratum-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_NUM_PARTITIONS: 12
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - stratum-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ---------------------------------------------------------------------------
  # KAFKA SCHEMA REGISTRY
  # ---------------------------------------------------------------------------
  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.3
    container_name: stratum-schema-registry
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - stratum-net

  # ---------------------------------------------------------------------------
  # NEO4J ENTERPRISE (Knowledge Graph)
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5.15-enterprise
    container_name: stratum-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"    # HTTP browser
      - "7687:7687"    # Bolt
    environment:
      NEO4J_AUTH: neo4j/stratum_neo4j_secret
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_dbms_memory_heap_initial__size: 2G
      NEO4J_dbms_memory_heap_max__size: 4G
      NEO4J_dbms_memory_pagecache_size: 2G
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
    volumes:
      - neo4j-data:/data
    networks:
      - stratum-net
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 20s
      timeout: 10s
      retries: 10

  # ---------------------------------------------------------------------------
  # POSTGRESQL (Transactional)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: stratum-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: stratum_db
      POSTGRES_USER: stratum
      POSTGRES_PASSWORD: stratum_pg_secret
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./schemas/postgres:/docker-entrypoint-initdb.d
    networks:
      - stratum-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stratum -d stratum_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # TIMESCALEDB (Time-Series)
  # ---------------------------------------------------------------------------
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: stratum-timescaledb
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: stratum_timeseries
      POSTGRES_USER: stratum_ts
      POSTGRES_PASSWORD: stratum_ts_secret
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./schemas/timescaledb:/docker-entrypoint-initdb.d
    networks:
      - stratum-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stratum_ts -d stratum_timeseries"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # REDIS (Cache + Pub/Sub)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: stratum-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass stratum_redis_secret --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - stratum-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "stratum_redis_secret", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # MINIO (S3-Compatible Object Storage)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: stratum-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"    # Console
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    networks:
      - stratum-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # VAULT (Secrets Management)
  # ---------------------------------------------------------------------------
  vault:
    image: hashicorp/vault:1.15
    container_name: stratum-vault
    restart: unless-stopped
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root-dev-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    volumes:
      - vault-data:/vault/data
    networks:
      - stratum-net
    healthcheck:
      test: ["CMD", "vault", "status", "-address", "http://localhost:8200"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # PROMETHEUS
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: stratum-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - stratum-net

  # ---------------------------------------------------------------------------
  # GRAFANA
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.2.3
    container_name: stratum-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: stratum_grafana
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/stratum-engine-room.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - stratum-net

  # ---------------------------------------------------------------------------
  # ELASTICSEARCH (ELK Stack)
  # ---------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
    container_name: stratum-elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx2g"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - stratum-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ---------------------------------------------------------------------------
  # KIBANA
  # ---------------------------------------------------------------------------
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.3
    container_name: stratum-kibana
    restart: unless-stopped
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    networks:
      - stratum-net
