name: CI/CD — STRATUM PROTOCOL

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  IMAGE_PREFIX: stratum

jobs:
  # =========================================================================
  # LINT & TEST
  # =========================================================================
  lint-test:
    name: Lint & Test Python Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - data-ingestion-service
          - knowledge-graph-service
          - state-estimation-engine
          - cascade-failure-engine
          - decision-ledger-service
          - federated-learning-service
          - sovereign-governance-layer
          - orchestration-engine
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: |
          cd services/${{ matrix.service }}
          pip install -r requirements.txt
          pip install pytest pytest-asyncio ruff

      - name: Lint with ruff
        run: |
          cd services/${{ matrix.service }}
          ruff check . --output-format=github

      - name: Run tests
        run: |
          cd services/${{ matrix.service }}
          pytest tests/ -v --tb=short -x || echo "No tests yet — skipping"
        env:
          STRATUM_ENV: test
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092

  lint-test-frontend:
    name: Lint & Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Type check
        run: cd frontend && npm run type-check

      - name: Build
        run: cd frontend && npm run build
        env:
          VITE_MAPBOX_ACCESS_TOKEN: ${{ secrets.VITE_MAPBOX_ACCESS_TOKEN }}

  # =========================================================================
  # DOCKER BUILD & PUSH (main branch only)
  # =========================================================================
  build-push:
    name: Build & Push Docker Images
    needs: [lint-test, lint-test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - data-ingestion-service
          - knowledge-graph-service
          - state-estimation-engine
          - cascade-failure-engine
          - citizen-behavior-engine
          - policy-simulation-engine
          - capital-optimization-engine
          - decision-ledger-service
          - federated-learning-service
          - sovereign-governance-layer
          - cyber-defense-engine
          - orchestration-engine
          - urban-evolution-simulator

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          file: infra/docker/Dockerfile.python-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PORT=${{ matrix.port }}

  build-push-frontend:
    name: Build & Push Frontend Image
    needs: [lint-test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: true
          tags: ${{ env.REGISTRY }}/stratum-frontend:latest,${{ env.REGISTRY }}/stratum-frontend:${{ github.sha }}
          build-args: |
            VITE_MAPBOX_ACCESS_TOKEN=${{ secrets.VITE_MAPBOX_ACCESS_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================================================
  # DEPLOY TO KUBERNETES
  # =========================================================================
  deploy:
    name: Deploy to Kubernetes
    needs: [build-push, build-push-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: "3.12.3"

      - name: Deploy via Helm
        run: |
          helm upgrade --install stratum-protocol infra/helm/stratum-protocol/ \
            --namespace stratum-system \
            --create-namespace \
            -f infra/helm/stratum-protocol/values-prod.yaml \
            --set global.imageTag=${{ github.sha }} \
            --set global.registry=${{ env.REGISTRY }} \
            --atomic \
            --timeout 10m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/stratum-knowledge-graph -n stratum-system --timeout=5m
          kubectl rollout status deployment/stratum-decision-ledger -n stratum-system --timeout=5m
          kubectl rollout status deployment/stratum-frontend -n stratum-system --timeout=5m

      - name: Run smoke tests
        run: |
          kubectl run smoke-test --image=curlimages/curl:latest \
            --restart=Never --rm -it \
            --namespace stratum-system \
            -- curl -f http://stratum-decision-ledger:8008/health || true
